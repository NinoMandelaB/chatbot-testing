<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mistral Agent Test</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; background: #f5f5f5; }
    h1 { font-size: 1.4rem; color: #333; margin-bottom: 4px; }
    #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.95rem; }
    #token-summary { font-size: 0.9rem; color: #555; margin-bottom: 12px; }
    #chat-box { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; height: 400px; overflow-y: auto; margin-bottom: 12px; }
    .msg { margin: 8px 0; }
    .user { color: #1a73e8; font-weight: bold; }
    .bot { color: #333; }
    #input-row { display: flex; gap: 8px; }
    #user-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
    button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:disabled { background: #aaa; }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="top-bar">
    <div>Logged in as <strong>{{ username }}</strong></div>
    <div><a href="/logout">Logout</a></div>
  </div>

  <h1>🤖 Mistral Agent Test Chat</h1>
  <div id="token-summary">
    Session tokens — prompt: <span id="sum-prompt">0</span>,
    completion: <span id="sum-completion">0</span>,
    total: <span id="sum-total">0</span>
  </div>

  <div id="chat-box"></div>
  <div id="input-row">
    <input id="user-input" type="text" placeholder="Type a message..." autofocus />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");

    const sumPromptEl = document.getElementById("sum-prompt");
    const sumCompletionEl = document.getElementById("sum-completion");
    const sumTotalEl = document.getElementById("sum-total");

    let sumPrompt = 0;
    let sumCompletion = 0;
    let sumTotal = 0;

    input.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

    function appendMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `<span class="${role}">${role === "user" ? "You" : "Agent"}:</span> ${text}`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function updateTokenSummary(usage) {
      if (!usage) return;

      const p = typeof usage.prompt_tokens === "number" ? usage.prompt_tokens : 0;
      const c = typeof usage.completion_tokens === "number" ? usage.completion_tokens : 0;
      const t = typeof usage.total_tokens === "number" ? usage.total_tokens : 0;

      sumPrompt += p;
      sumCompletion += c;
      sumTotal += t;

      sumPromptEl.textContent = sumPrompt;
      sumCompletionEl.textContent = sumCompletion;
      sumTotalEl.textContent = sumTotal;
    }

    async function sendMessage() {
      const msg = input.value.trim();
      if (!msg) return;
      input.value = "";
      btn.disabled = true;
      appendMessage("user", msg);

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg }),
        });

        let data;
        try {
          data = await res.json();
        } catch (e) {
          const text = await res.text();
          appendMessage("bot", `Error: Non‑JSON response from server: ${text.slice(0, 200)}...`);
          btn.disabled = false;
          input.focus();
          return;
        }

        if (!res.ok) {
          appendMessage("bot", `Error: ${data.error || res.statusText}`);
        } else {
          const text = data.reply || data.error || "No response";
          appendMessage("bot", text);
          updateTokenSummary(data.usage);
        }

      } catch (err) {
        appendMessage("bot", "Error: " + err.message);
      }
      btn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
