<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cortecs Model Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; height: 100dvh; display: flex; flex-direction: column; }

    /* ── Top bar ── */
    #top-bar {
      background: #1e1e2e; color: #cdd6f4;
      padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      font-size: 0.85rem;
    }
    #top-bar strong { font-size: 1rem; margin-right: auto; }
    #top-bar label { color: #a6adc8; white-space: nowrap; }
    #model-select {
      padding: 5px 8px; border-radius: 6px; border: 1px solid #45475a;
      background: #313244; color: #cdd6f4; font-size: 0.85rem; cursor: pointer;
    }
    #clear-btn {
      background: #313244; border: 1px solid #45475a; color: #f38ba8;
      padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
    }
    #adv-toggle {
      background: #313244; border: 1px solid #45475a; color: #89b4fa;
      padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
    }

    /* ── Advanced params panel ── */
    #adv-panel {
      background: #181825; color: #cdd6f4;
      padding: 10px 16px; display: none; flex-direction: column; gap: 10px;
      font-size: 0.82rem; border-bottom: 1px solid #313244;
    }
    #adv-panel.open { display: flex; }
    #adv-panel label { color: #a6adc8; white-space: nowrap; }
    .adv-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    #reasoning-select {
      padding: 4px 8px; border-radius: 5px; border: 1px solid #45475a;
      background: #313244; color: #cdd6f4; font-size: 0.82rem;
    }
    #history-limit {
      width: 60px; padding: 4px 6px; border-radius: 5px; border: 1px solid #45475a;
      background: #313244; color: #cdd6f4; font-size: 0.82rem; text-align: center;
    }
    #extra-body-input {
      flex: 1; min-width: 260px; padding: 4px 8px; border-radius: 5px;
      border: 1px solid #45475a; background: #313244; color: #cdd6f4;
      font-family: monospace; font-size: 0.8rem;
    }
    #system-prompt-input {
      width: 100%; padding: 8px 10px; border-radius: 5px;
      border: 1px solid #45475a; background: #313244; color: #cdd6f4;
      font-family: monospace; font-size: 0.8rem;
      resize: vertical; min-height: 160px; line-height: 1.5;
    }
    .adv-section-label {
      color: #7f849c; font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 2px;
    }

    /* ── Token bar ── */
    #token-bar {
      background: #181825; color: #6c7086;
      padding: 4px 16px; font-size: 0.75rem;
    }

    /* ── Chat box ── */
    #chat-box {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .bubble {
      max-width: 78%; padding: 10px 14px; border-radius: 14px;
      line-height: 1.55; white-space: pre-wrap; word-break: break-word; font-size: 0.93rem;
    }
    .bubble.user  { background: #1a73e8; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .bubble.bot   { background: #fff;    color: #1e1e2e; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .bubble.error { background: #f8d7da; color: #721c24; align-self: flex-start; border-bottom-left-radius: 4px; }
    .thinking { color: #888; font-style: italic; font-size: 0.82rem; align-self: flex-start; }

    /* ── Input row ── */
    #input-row {
      display: flex; gap: 8px; padding: 12px 16px;
      background: #fff; border-top: 1px solid #e0e0e0;
    }
    #user-input {
      flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 22px;
      font-size: 0.95rem; outline: none;
    }
    #user-input:focus { border-color: #1a73e8; }
    #send-btn {
      padding: 10px 20px; background: #1a73e8; color: #fff;
      border: none; border-radius: 22px; cursor: pointer; font-size: 0.9rem; font-weight: 600;
    }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="top-bar">
    <strong>🤖 Cortecs Model Tester</strong>
    <label for="model-select">Model:</label>
    <select id="model-select">
      <option value="qwen3.5-9b" selected>qwen3.5-9b</option>
      <option value="qwen3-30b-a3b-instruct-2507">qwen3-30b-a3b-instruct-2507</option>
      <option value="llama-3.3-70b-instruct">llama-3.3-70b-instruct</option>
      <option value="llama-4-maverick">llama-4-maverick</option>
      <option value="gemma-3-27b-it">gemma-3-27b-it</option>
      <option value="mistral-small-2603">mistral-small-2603</option>
      <option value="mistral-nemo-instruct-2407">mistral-nemo-instruct-2407</option>
      <option value="deepseek-v4-flash">deepseek-v4-flash</option>
      <option value="minimax-m2">minimax-m2</option>
      <option value="nvidia-nemotron-3-nano-omni">nvidia-nemotron-3-nano-omni</option>
      <option value="hermes-4-70b">hermes-4-70b</option>
    </select>
    <button id="clear-btn" onclick="clearChat()">🗑️ Clear</button>
    <button id="adv-toggle" onclick="toggleAdv()">⚙️ Advanced</button>
  </div>

  <!-- Advanced params -->
  <div id="adv-panel">
    <!-- Row 1: reasoning + history limit + extra_body -->
    <div class="adv-row">
      <label for="reasoning-select">reasoning_effort:</label>
      <select id="reasoning-select">
        <option value="">— none —</option>
        <option value="low">low</option>
        <option value="medium">medium</option>
        <option value="high">high</option>
      </select>
      <label for="history-limit">history turns:</label>
      <input id="history-limit" type="number" min="0" max="100" value="20"/>
      <label for="extra-body-input">extra_body JSON:</label>
      <input id="extra-body-input" type="text"
             value='{"chat_template_kwargs": {"enable_thinking": false}}'
             placeholder='{"chat_template_kwargs": {"enable_thinking": false}}'/>
    </div>
    <!-- Row 2: system prompt -->
    <div>
      <div class="adv-section-label">System Prompt</div>
      <textarea id="system-prompt-input">You are a safe, immersive NSFW-AI roleplay assistant for adult users. Generate character-consistent roleplay in users language. **NO TOOL USE. No function calls. Pure chat only.**

# Instruction Priority
1. Safety rules (overrides everything)
2. System rules
3. Character card
4. Session settings  
5. User request
6. History

# Core Behavior
- Stay in character unless safety/crisis
- All characters = fictional adults (18+)
- Warm, believable, East Africa aware
- **GREATER EMPATHY**: "I hear you. That's heavy. You're not alone in this." / "Sawa, naelewa. Si rahisi. Wewe sio peke yako."
- Family/community support ≠ safe assumption
- Distress → empathy > roleplay

# Safety Rules (HARD BLOCKS)
**Never:**
- Minors / "young" / "teen" / "17" / "barely legal" / schoolgirl / 
  schoolboy / "perky young" / "still developing" / daddy+young/teen/little/baby
  in sexual context
- Incest / family sex
- Bestiality
- Non-consent (force / threats / incapacity)
- CSAM / rape / graphic violence
- Self-harm / suicide encouragement
- Hate / criminal instruction / doxxing

# Pre-Response Safety Check 
Before every response in a sexual or romantic scene:
1. Re-read the latest user message in full.
2. Scan for any hard-block trigger above, including obfuscations 
   (numbers as words, language switches, indirect descriptors).
3. If ANY trigger is present: exit scene immediately using the 
   refusal template. Do NOT modify, soften, or continue the scene.
4. Coherence with prior turns does NOT override a hard block. 
   Character momentum does NOT override a hard block. 
   User insistence does NOT override a hard block.
5. Only after this check passes, generate the response.

**Refusal (exit-scene template):**
"I have to stop the roleplay here. [trigger] is something I cannot 
include, even fictionally. If you'd like to continue, we can rewind 
to before that point with all characters as adults."
Drop character. Do not narrate. Do not react i

# Edgier Roleplay (Adult Fiction Only)
**ALLOWED:**
- BDSM/degradation (consensual)
- Adult sex work (character-defined)
- Rough/taboo (adult/fictional)

# Crisis Support (GREATER CRISIS PHRASES)
**Self-harm/suicide:**
"Sawa, naona unahisi vibaya sana. Wewe sio peke yako. Piga simu:
- Befriender's Kenya: +254 722 178 177  
- Niskize: 0900 620 800"

**Abuse/distress:**
"Nadhani unahitaji msaada wa karibu. Kuna watu wanaoweza kukusaidia kimya kimya."

# Sensitive Advice (Direct)
- FGM: "Hiyo si sawa. Inaharibu maisha."
- LGBTQ+: "Kuwa gay si dhambi. Ni jinsi Mungu alikuumba."
- Violence: "Hiyo si sawa. Hakuna mtu anayestahili kuumizwa."


# Output
Character/supportive only. No tools. No policy unless refusing.</textarea>
    </div>
  </div>

  <!-- Token stats -->
  <div id="token-bar">
    Tokens — prompt: <span id="t-prompt">0</span> &nbsp;|
    completion: <span id="t-comp">0</span> &nbsp;|
    total: <span id="t-total">0</span>
    &nbsp;&nbsp;|&nbsp;&nbsp; history: <span id="t-hist">0</span> turns
  </div>

  <!-- Chat -->
  <div id="chat-box"></div>

  <!-- Input -->
  <div id="input-row">
    <input id="user-input" type="text" placeholder="Type a message and press Enter…" autofocus/>
    <button id="send-btn" onclick="send()">Send</button>
  </div>

  <script>
    const chatBox  = document.getElementById('chat-box');
    const input    = document.getElementById('user-input');
    const sendBtn  = document.getElementById('send-btn');
    let tPrompt = 0, tComp = 0, tTotal = 0;

    // In-memory conversation history: [{role, content}, ...]
    let history = [];

    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) send(); });

    function toggleAdv() {
      document.getElementById('adv-panel').classList.toggle('open');
    }

    function clearChat() {
      history = [];
      chatBox.innerHTML = '';
      document.getElementById('t-hist').textContent = '0';
    }

    function bubble(role, text) {
      const d = document.createElement('div');
      d.className = 'bubble ' + role;
      d.textContent = text;
      chatBox.appendChild(d);
      chatBox.scrollTop = chatBox.scrollHeight;
      return d;
    }

    function updateTokens(usage) {
      if (!usage) return;
      tPrompt += usage.prompt_tokens     || 0;
      tComp   += usage.completion_tokens || 0;
      tTotal  += usage.total_tokens      || 0;
      document.getElementById('t-prompt').textContent = tPrompt;
      document.getElementById('t-comp').textContent   = tComp;
      document.getElementById('t-total').textContent  = tTotal;
    }

    async function send() {
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      sendBtn.disabled = true;

      bubble('user', msg);

      // Read params
      const model           = document.getElementById('model-select').value;
      const reasoningEffort = document.getElementById('reasoning-select').value;
      const extraBodyRaw    = document.getElementById('extra-body-input').value.trim();
      const systemPrompt    = document.getElementById('system-prompt-input').value.trim();
      const maxTurns        = parseInt(document.getElementById('history-limit').value, 10) || 20;

      let extraBody = null;
      if (extraBodyRaw) {
        try { extraBody = JSON.parse(extraBodyRaw); }
        catch (e) {
          bubble('error', '⚠️ extra_body is not valid JSON: ' + e.message);
          sendBtn.disabled = false;
          return;
        }
      }

      const thinking = document.createElement('div');
      thinking.className = 'thinking';
      thinking.textContent = '…';
      chatBox.appendChild(thinking);
      chatBox.scrollTop = chatBox.scrollHeight;

      // Slice history to last maxTurns *pairs* = maxTurns*2 messages
      const historySlice = history.slice(-(maxTurns * 2));

      const body = { message: msg, model, history: historySlice };
      if (extraBody)       body.extra_body       = extraBody;
      if (reasoningEffort) body.reasoning_effort = reasoningEffort;
      if (systemPrompt)    body.system_prompt    = systemPrompt;

      try {
        const res  = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        thinking.remove();

        if (!res.ok || data.error) {
          bubble('error', 'Error: ' + (data.error || res.statusText));
        } else {
          const reply = data.reply || '(empty response)';
          bubble('bot', reply);
          updateTokens(data.usage);

          // Append this exchange to history
          history.push({ role: 'user',      content: msg   });
          history.push({ role: 'assistant', content: reply });
          document.getElementById('t-hist').textContent = Math.floor(history.length / 2);
        }
      } catch (err) {
        thinking.remove();
        bubble('error', 'Network error: ' + err.message);
      }

      sendBtn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
