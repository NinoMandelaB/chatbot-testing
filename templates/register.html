<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 0 16px; background: #f5f5f5; }
    h1 { font-size: 1.4rem; color: #333; margin-bottom: 4px; }
    .bonus { font-size: 1rem; font-weight: bold; color: #1a73e8; margin-bottom: 16px; }
    form { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
    label { display: block; margin-bottom: 4px; font-size: 0.9rem; }
    input { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; }
    button { width: 100%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .error { color: #b00020; margin-bottom: 8px; font-size: 0.9rem; }
    .link { margin-top: 8px; font-size: 0.9rem; }
    ul { margin-top: 0; padding-left: 20px; }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Create your account</h1>
  <div class="bonus">🎁 Get {{ registered_coins }} coins instantly on registration!</div>

  <form method="post">
    {% if errors and errors|length > 0 %}
      <div class="error">
        <ul>{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>
      </div>
    {% endif %}

    <label for="username">Username</label>
    <input id="username" name="username" value="{{ username or '' }}" required />

    <label for="email">Email</label>
    <input id="email" name="email" type="email" value="{{ email or '' }}" required />

    <label for="gender">Gender</label>
    <input id="gender" name="gender" value="{{ gender or '' }}" />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required />

    <label for="confirm">Confirm Password</label>
    <input id="confirm" name="confirm" type="password" required />

    <button type="submit">Create Account & Get {{ registered_coins }} Coins</button>
  </form>
  <div class="link">Already registered? <a href="/login">Login</a></div>
</body>
</html>
